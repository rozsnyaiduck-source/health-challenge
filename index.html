<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organ Health Quiz | 30 Day Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bio-background" id="canvas-container"></div>
    
    <main class="glass-container">
        <section id="quiz-intro">
            <div class="organ-icon-glow">🫀</div>
            <h1>How Healthy Are Your <span class="glow-text">Organs?</span></h1>
            <p>Take the 2 minute test and discover what your body might be missing.</p>
            <button class="btn-main" onclick="startQuiz()">Start the Test</button>
        </section>

        <section id="quiz-container" class="hidden">
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="question-box">
                <h2 id="question-text">Question Load...</h2>
                <div id="answer-options"></div>
            </div>
        </section>

        <section id="result-container" class="hidden">
            <h2>Your Bio-Score: <span id="score-num" class="glow-text">0</span>/100</h2>
            <p id="result-msg"></p>
            <a href="program.html" class="btn-main pulse">Join the 30 Day Eat For Your Organs Challenge</a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
